apiVersion: v1
kind: Namespace
metadata:
  name: intentos
  labels:
    name: intentos
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: intentos
  namespace: intentos
  labels:
    app: intentos
    version: v9.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: intentos
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: intentos
        version: v9.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: intentos-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: intentos
        image: intentos/intentos:v9.0
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: intentos-secrets
              key: redis-url
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: intentos-secrets
              key: openai-api-key
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: intentos-secrets
              key: anthropic-api-key
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        livenessProbe:
          httpGet:
            path: /v1/status
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /v1/status
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: data
          mountPath: /opt/intentos/data
        - name: checkpoints
          mountPath: /opt/intentos/checkpoints
        - name: logs
          mountPath: /opt/intentos/logs
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: intentos-data-pvc
      - name: checkpoints
        persistentVolumeClaim:
          claimName: intentos-checkpoints-pvc
      - name: logs
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: intentos
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: intentos-service
  namespace: intentos
  labels:
    app: intentos
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: intentos
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: intentos-hpa
  namespace: intentos
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: intentos
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
      - type: Pods
        value: 4
        periodSeconds: 60
      selectPolicy: Max
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: intentos-pdb
  namespace: intentos
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: intentos

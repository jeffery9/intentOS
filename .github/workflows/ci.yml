name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install specific ruff version for consistency
        python -m pip install ruff==0.2.2
        python -m pip install ".[all]" mypy types-PyYAML
        # Clean up build artifacts that may be created during install
        rm -rf build/ dist/ *.egg-info

    - name: Show Ruff version and config
      run: |
        ruff --version
        echo "--- pyproject.toml ruff config ---"
        grep -A 20 "\[tool.ruff\]" pyproject.toml || true

    - name: Run Ruff check
      run: ruff check .

    - name: Run Ruff format check
      run: ruff format --check .

    - name: Run mypy
      run: mypy intentos

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install ".[all]"

    - name: Run tests
      run: pytest

# Ruff 配置文件
# 用于 CI 和本地检查

line-length = 100
target-version = "py310"

# 排除目录
exclude = [
    "examples",
    "deprecated",
    ".git",
    ".mypy_cache",
    ".pytest_cache",
    "__pycache__",
    "*.egg-info",
]

# 启用的规则
lint.select = ["E", "F", "W", "I"]

# 忽略的规则
# E501: 行过长 (在演示文件中常见)
# F841: 未使用的变量 (演示文件中用于展示 API 用法)
lint.ignore = ["E501", "F841"]
